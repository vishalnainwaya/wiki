{% extends "encyclopedia/layout.html" %}

{% block title %}
    Result
{% endblock %}

{% block body %}
    {% if newList|length < 1 %}
        <div>Search didn't yeild any result. Please try again !</div>
    {% else %}
        <h1>Results</h1>
        <ul>
            {% for item in newList %}
                <li><a href="{% url 'link' item %}">{{item}}</a></li>
            {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
